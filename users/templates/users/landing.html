{% extends 'base.html' %}
{% load static %}

{% block css %}
    <link rel="stylesheet" type='text/css' href="{%static 'users/login.css'%}">
{% endblock %}

{% block content %}
<div class='background'>
    <h1 class='login-header'>
        Welcome to <span>UVA Thrift</span>
    </h1>
    <!-- <h3>Get ready for the best deals of your life.</h3> -->
     <h4>Ready to get started? Sign up or login below.</h4>
    <div class='container login'>
        <section class='login-box'>
            {% comment %} <h1>Login</h1> {% endcomment %}
            <div class='select-buttons'>
                <a class="login-lnk-btn" href="{% url 'login' %}">Login</a>
                <a class="signup-lnk-btn" href="{% url 'signup' %}">Sign Up</a>
            </div>
        </section>
    </div>
</div>
{% endblock %}
