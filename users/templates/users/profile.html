{% extends 'dashboard/dashboard.html' %}
{% load static %}

{% block css %}
    <link rel="stylesheet" type='text/css' href="{%static 'users/profile.css'%}">
    <link rel="stylesheet" type='text/css' href="{%static 'dashboard/login.css'%}">
    <link rel='stylesheet' type='text/css' href="{%static 'dashboard/dashboard.css'%}">
{% endblock %}

{% block content %}
<h1 style='text-align: center;'>Your Profile</h1>
<form method="post" action="{% url 'edit_profile' %}"  style="display: flex; justify-content: center;">
    {% csrf_token %}
    <input type="hidden" name="user_id" value="{{ user.id }}">
    <input type='hidden' name='action' value='edit'>
    <button type="submit">Edit</button>
</form>
<br>
<br>
<div class='profile-container'>
    <img class="profile-picture" src={{ user.profile.image.url }} />
    <p>{{ user.username }}</p>
    <p>{{ user.email }}</p>
    <p><span style='font-weight: bold;'>Date Joined: </span>{{user.socialaccount_set.all.0.date_joined}}</p>
    <p><span style='font-weight: bold;'>Total Donations: </span>0</p>
</div>
{% endblock %}
