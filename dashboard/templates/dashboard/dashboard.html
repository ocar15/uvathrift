{% extends 'base.html' %}
{% load static %}
{% load socialaccount %}

{% block css %}
    <link rel="stylesheet" type='text/css' href="{%static 'css/base.css'%}">
    <link rel="stylesheet" type='text/css' href="{%static 'dashboard/login.css'%}">
    <link rel="stylesheet" type='text/css' href="{%static 'dashboard/dashboard.css'%}">
{% endblock %}

{% block navbar-right %}
    <a href="{% url 'postman:inbox'%}">
        <button class="nav-btn">Messages</button>
    </a>
    {% if mode == 'admin' %}
    <a href="{% url 'admin_only' %}">
        <button class='nav-btn admin-btn'>Admin Panel</button>
    </a> 
    {% endif %}
    <a href="{% url 'logout' %}"> <button class='nav-btn'>Logout</button> </a>
    <a style='color: black;' class="username-display" href="{% url 'my_profile' %}">
        <img class='nav-pfp' src="{{ user.profile.image.url }}">
        <span style="margin-left: 10px; margin-right: 5px;">{{ user }}</span>
        <span style='color: red;'>({{ mode }})</span></a>
{% endblock %}

{% block content %}
<p>current mode: {{mode}}</p>
{% endblock content %}
