{% for item in items %}
    <div class="item-card">
        {% if item.image %}
            <img src="{{ item.image.url }}" alt="{{ item.title }}" class="item-img">
        {% endif %}
        <h3>{{ item.title }}</h3>
        <p><strong>${{ item.price }}</strong></p>
        <p>{{ item.description }}</p>
        <p class="seller">Seller: {{ item.seller.username }}</p>

        {% if user == item.seller or user.is_staff %}
            <form method="POST" action="{% url 'item_delete' item.pk %}">
                {% csrf_token %}
                <button type="submit" class="nav-btn">Delete</button>
            </form>
        {% endif %}
    </div>
{% endfor %}
