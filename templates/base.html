<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UVA Thrift{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block css %}{% endblock %}
</head>
<body>
    <header>
        {% block header %}
        <nav class="navbar">
            <div class="navbar-left">
                <a href="/">
                    <h3>UVA Thrift</h3>
                </a>
            </div>
            <div class="navbar-right">
                <a href="{% url 'login'%}">
                    <button class="nav-login-btn">Login</button>
                </a>
            </div>
        </nav>
        {% endblock %}
    </header>

    <main>
        {% block content %}
        
        {% endblock content %}
    </main>

    <footer>
        {% block footer %}
        <div class="footer">
            <h5>UVA Thrift Copyright © 2025 A10. MIT License.</h5>
        </div>
        {% endblock footer %}
    </footer>
</body>
</html>
